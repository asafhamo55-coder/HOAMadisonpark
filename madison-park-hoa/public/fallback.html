<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madison Park HOA — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #1e3a5f;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      opacity: 0.8;
      max-width: 320px;
      line-height: 1.5;
    }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #ffffff;
      color: #1e3a5f;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .retry:active { opacity: 0.8; }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="96" height="96" rx="18" fill="rgba(255,255,255,0.15)"/>
    <text x="48" y="52" text-anchor="middle" dominant-baseline="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="40" font-weight="bold" fill="#ffffff">MP</text>
  </svg>
  <h1>You're currently offline</h1>
  <p>Please check your internet connection and try again.</p>
  <button class="retry" onclick="window.location.reload()">Try Again</button>
</body>
</html>
